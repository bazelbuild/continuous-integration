name: "Terraform Monorepo Governance"

on:
  pull_request:
    paths: ["buildkite/terraform/**"]
  push:
    branches: ["master"]
    paths: ["buildkite/terraform/**"]

# go/github-security: Explicitly set minimum permissions
permissions:
  contents: read      # Required to check out the code
  id-token: write      # Required for Workload Identity Federation (WIF)
  pull-requests: write # Required to post plan output as a comment

jobs:
  # Job 1: Detect which organization folders changed
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      orgs: ${{ steps.process-orgs.outputs.orgs }}
    steps:
    - name: Checkout Code
      uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

    - name: Get changed files
      id: changed-files
      uses: tj-actions/changed-files@dcc7a0cba800f454d79fff4b9972b6252438612f # v45.0.0
      with:
        dir_names: true
        dir_names_max_depth: 3
        json: true
        files: "buildkite/terraform/**"
        quotepath: false

    - name: Process Changed Orgs
      id: process-orgs
      env:
        ALL_CHANGED_FILES: ${{ steps.changed-files.outputs.all_changed_files }}
      run: |
        # Strip 'buildkite/terraform/' prefix from each path in the JSON array
        ORGS=$(echo "$ALL_CHANGED_FILES" | jq -c 'map(sub("buildkite/terraform/"; ""))')
        echo "orgs=$ORGS" >> "$GITHUB_OUTPUT"

  # Job 2: Terraform Execution
  terraform:
    needs: detect-changes
    if: |
      needs.detect-changes.outputs.folders != '[]' && 
      (github.event_name == 'push' || 
       github.event.pull_request.author_association == 'MEMBER' || 
       github.event.pull_request.author_association == 'OWNER')
    runs-on: ubuntu-latest

    # Ensure only one terraform run happens at a time per org
    concurrency:
      group: ${{ github.workflow }}-${{ matrix.org }}-${{ github.ref }}
      cancel-in-progress: ${{ github.event_name == 'pull_request' }}

    # Use environment for secret isolation and manual approvals
    environment: ${{ matrix.org }}
    strategy:
      fail-fast: false # If one org fails, don't stop the others
      matrix:
        org: ${{ fromJSON(needs.detect-changes.outputs.orgs) }}

    defaults:
      run:
        working-directory: ./buildkite/terraform/${{ matrix.org }}

    steps:
    - name: Checkout Code
      uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@62ee50e18b458fcf27c1765166696735847add86 # v2.1.7
      with:
        workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
        service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@b9cd54a3c349d3f6272e0339e9588eb6b84a6efc # v3.1.2
      with:
        terraform_wrapper: true
        terraform_version: "1.9.5"
    
    - name: Terraform Init
      run: terraform init

    - name: Terraform Plan
      if: github.event_name == 'pull_request'
      id: plan
      env:
        TF_VAR_buildkite_api_token: ${{ secrets.BUILDKITE_API_TOKEN }}
      run: terraform plan -no-color -input=false

    - name: Post Plan to PR
      if: github.event_name == 'pull_request'
      uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
      env:
        PLAN: "terraform\n${{ steps.plan.outputs.stdout }}"
      with:
        script: |
          const output = `#### Terraform Plan for \`${{ matrix.org }}\` 📖
          <details><summary>Show Plan</summary>
          
          \`\`\`${process.env.PLAN}\`\`\`
          
          </details>
          
          *Pusher: @${{ github.actor }}, Action: \`${{ github.event_name }}\`*`;
          
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: output
          })

    - name: Terraform Apply
      if: github.ref == 'refs/heads/master' && github.event_name == 'push'
      env:
        TF_VAR_buildkite_api_token: ${{ secrets.BUILDKITE_API_TOKEN }}
      run: terraform apply -auto-approve -input=false